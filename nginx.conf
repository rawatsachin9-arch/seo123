server {
    listen 80;
    server_name skyairlinetickets.com www.skyairlinetickets.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name skyairlinetickets.com www.skyairlinetickets.com;

    ssl_certificate /etc/letsencrypt/live/skyairlinetickets.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/skyairlinetickets.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Sitemap — proxy directly to backend
    location = /sitemap.xml {
        proxy_pass http://localhost:4000/sitemap.xml;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Frontend (Next.js on port 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API (Express on port 4000)
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
